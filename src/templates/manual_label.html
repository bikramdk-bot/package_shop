<!-- templates/manual_label.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Manual Label</title>
  <style>
    body { 
      font-family: sans-serif; 
      text-align: center; 
      margin-top: 80px; /* leave space for the fixed nav bar */
    }
    input { 
      margin: 8px; 
      font-size: 20px; 
      padding: 6px; 
    }
    button { 
      font-size: 22px; 
      padding: 8px 16px; 
      background-color: #0056b3; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer;
    }
    button:hover { background-color: #00408f; }
  </style>
</head>
<body>

  {% include 'nav_bar.html' %}

  <h2>🏷️ Manual Label Printing</h2>

  <form id="manualForm">
    <input type="text" id="lcn" placeholder="LCN (e.g. PostNord)" required><br>
    <input type="text" id="digits" placeholder="Last 4 digits" required><br>
    <button type="submit">Send to Printer</button>
  </form>

  <p id="status" style="font-size:18px;color:green;margin-top:10px;"></p>

  <script>
    document.getElementById('manualForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const lcn = document.getElementById('lcn').value.trim();
      const digits = document.getElementById('digits').value.trim();

      const res = await fetch('/manual_label', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ lcn, digits })
      });

      const data = await res.json();
      const msg = document.getElementById('status');
      if (data.status) {
        msg.textContent = '✅ Label sent successfully!';
        msg.style.color = 'green';
      } else {
        msg.textContent = '❌ ' + (data.error || 'Failed to send label');
        msg.style.color = 'red';
      }
      setTimeout(() => msg.textContent = '', 3000);
    });
  </script>
</body>
</html>
