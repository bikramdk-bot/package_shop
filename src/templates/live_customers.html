<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title data-i18n="liveCustomersTitle">Live Customer Entries</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { font-family: sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #f0f0f0; }
  #table tbody td { font-size: 3rem; font-weight: 600; line-height: 1.1; }
  #table tbody td.live-last4 { font-weight: 800; }
  #table tbody td.live-actions { font-size: 1rem; font-weight: 400; }
  #table tbody td.live-actions button,
  #table tbody td.live-countdown button { font-size: 1rem; }
  .countdown { font-weight: bold; }
  .flags { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 8px; z-index: 1000; }
  .flag { width: 40px; height: 28px; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.12); display: inline-flex; align-items: center; justify-content: center; background: #fff; }
  .flag.active { outline: 3px solid #0ea5e9; outline-offset: 2px; }
  .flag img { width: 28px; height: 20px; display: block; }
  /* License expired overlay */
  #licenseBlocker { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 900; text-align: center; padding: 20px; }
  #licenseBlocker h2 { margin: 0; font-size: 1.4rem; }
  #licenseBlocker p { margin: 0; color: #374151; }
  #licenseBlocker a.btn { display: inline-block; margin-top: 6px; padding: 10px 14px; background: #f59e0b; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  #licenseBlocker a.btn:hover { background: #d97706; }
</style>
</head>
<body>
  <div id="licenseBlocker" aria-live="polite" aria-atomic="true">
    <h2 data-i18n="licenseExpiredTitle">🔒 License expired</h2>
    <p data-i18n="licenseExpiredMsg">Please activate your license to continue using the dashboard.</p>
    <a class="btn" href="/staff" data-i18n="activateLicense">Activate License</a>
  </div>
  <div class="flags">
    <div class="flag active" data-lang="da" title="Dansk" role="button" aria-pressed="true" tabindex="0" onclick="updateLanguage('da')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('da'); event.preventDefault();}">
      <img src="/static/flags/da.svg" alt="Dansk" />
    </div>
    <div class="flag" data-lang="en" title="English" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('en')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('en'); event.preventDefault();}">
      <img src="/static/flags/en.svg" alt="English" />
    </div>
    <div class="flag" data-lang="de" title="Deutsch" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('de')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('de'); event.preventDefault();}">
      <img src="/static/flags/de.svg" alt="Deutsch" />
    </div>
    <div class="flag" data-lang="sv" title="Svenska" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('sv')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('sv'); event.preventDefault();}">
      <img src="/static/flags/sv.svg" alt="Svenska" />
    </div>
  </div>
  <h2 data-i18n="liveQueue">👀 Live Customer Queue</h2>
  {% include 'nav_bar.html' %}
  <table id="table">
    <thead>
      <tr>
        <th data-i18n="assignCustomerNumber">Customer Number</th>
        <th data-i18n="colDigits">Digits</th>
        <th data-i18n="colKode">Afhentningskode</th>
  <th data-i18n="colProvider">Provider</th>
  <th data-i18n="colCollectionActions">Collection</th>
        <th data-i18n="colCountdown">Countdown</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
let entriesCache = [];

async function loadEntries() {
  const res = await fetch('/customer_entries');
  const data = await res.json();
  const tbody = document.querySelector('#table tbody');
  tbody.innerHTML = '';

  entriesCache = data; // store for countdown updates

  const now = new Date();

  for (const row of data) {
    const createdAt = new Date(row.created_at);
    const elapsed = (now - createdAt) / 1000;
    // Prefer server-computed remaining (hold-aware). Fallback to naive calc.
    const remaining = Math.max(0, typeof row.remaining === 'number' ? row.remaining : (300 - elapsed));

    const tr = document.createElement('tr');

    // color-code remaining text. Group background is only applied for finalized entries
    const color =
      remaining <= 15 ? 'red' :
      remaining <= 60 ? 'orange' : 'green';

    // Determine whether this entry is considered "finalized" for coloring.
    // We treat entries with an assigned ticket_number or a collection_id as finalized.
    const isFinalized = (typeof row.ticket_number === 'number' && row.ticket_number > 0) || (!!row.collection_id);
    if (isFinalized) {
      const basis = (typeof row.ticket_number === 'number' && row.ticket_number > 0) ? row.ticket_number : (row.id || 0);
      const groupIdx = ((basis - 1) % 10) + 1; // 1..10
      tr.classList.add(`customer-color-${groupIdx}`);
    } else {
      // ensure no group class is set; keep default (white) background
    }

  const holdStart = i18n?.[currentLang]?.holdStart || 'Pause';
  const holdPause = i18n?.[currentLang]?.holdPause || 'Continue';
    const delivered = i18n?.[currentLang]?.delivered || 'Delivered';
    const notDelivered = i18n?.[currentLang]?.notDelivered || 'Not Delivered';

    tr.innerHTML = `
      <td class="live-number">${row.ticket_number ?? ''}</td>
      <td class="live-last4">${row.digits}</td>
      <td class="live-code">${row.kode ?? ''}</td>
      <td class="live-provider">${row.provider}</td>
      <td class="live-actions">
        <button onclick="deliveredEntry(${row.id})">${delivered}</button>
        <button onclick="notDeliveredEntry(${row.id})">${notDelivered}</button>
      </td>
      <td class="countdown live-countdown" data-entry-id="${row.id}" data-remaining="${remaining.toFixed(0)}" data-held="${row.held ? '1':'0'}" data-paused="0" style="color:${color}; display:flex; gap:8px; align-items:center; justify-content:center;">
        <button aria-label="Pause/Resume" title="Pause/Resume" onclick="togglePause(${row.id})" style="background:none;border:none;padding:0;cursor:pointer;display:inline-flex;align-items:center;">
          <!-- default: red pause icon (will toggle to green play when paused) -->
          <svg id="icon-${row.id}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="4" height="16" rx="1"></rect>
            <rect x="14" y="4" width="4" height="16" rx="1"></rect>
          </svg>
        </button>
        <span class="time-text">${remaining.toFixed(0)}s</span>
      </td>
    `;

    tbody.appendChild(tr);
    // Reflect server-side hold state for this entry (packet-specific)
    try {
      const cell = tbody.querySelector(`.countdown[data-entry-id="${row.id}"]`);
      if (cell) {
        // server provides `held` flag per row; when held, show play icon (green)
        if (row.held) {
          cell.dataset.held = '1';
          const icon = document.getElementById(`icon-${row.id}`);
          if (icon) {
            icon.innerHTML = '<path d="M5 3v18l15-9z"/>'; // play triangle
            icon.setAttribute('stroke', 'green');
            icon.setAttribute('fill', 'green');
          }
        } else {
          cell.dataset.held = '0';
        }
      }
    } catch (e) { /* ignore DOM errors */ }
  }
}

function updateCountdowns() {
  const cells = document.querySelectorAll('.countdown');
  cells.forEach(cell => {
    const held = cell.dataset.held === '1';
    const paused = cell.dataset.paused === '1';
    let remaining = parseInt(cell.dataset.remaining || '0', 10);
    // Do not decrement if paused or held
    if (!held && !paused && remaining > 0) {
      remaining -= 1;
      cell.dataset.remaining = String(remaining);
    }
    // update displayed time text (preserve other children like icon/button)
    const timeSpan = cell.querySelector('.time-text');
    if (timeSpan) timeSpan.textContent = `${remaining}s`;
    // color the time text according to remaining
    const color = remaining <= 15 ? 'red' : remaining <= 60 ? 'orange' : 'green';
    // apply to the time text only
    if (timeSpan) timeSpan.style.color = color;
  });
}

async function holdStartEntry(id) {
  await fetch('/hold_entry', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ entry_id: id })
  });
  loadEntries(); // refresh after hold
}

async function holdPauseEntry(id) {
  await fetch('/unhold_entry', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ entry_id: id })
  });
  loadEntries();
}

async function resolve(id, action){
  await fetch('/resolve_entry', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ entry_id: id, action })
  });
  loadEntries();
}

function deliveredEntry(id) { resolve(id, 'collected'); }
function notDeliveredEntry(id) { resolve(id, 'keep'); }

// --- Pause / resume per-row (client-side, persisted in localStorage) ---
// Toggle pause by calling server-side hold/unhold so pause is packet-specific
function togglePause(entryId) {
  const cell = document.querySelector(`.countdown[data-entry-id="${entryId}"]`);
  if (!cell) return;
  const held = cell.dataset.held === '1';
  // If currently held on the server, call unhold; otherwise call hold
  const url = held ? '/unhold_entry' : '/hold_entry';
  fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ entry_id: entryId })
  }).then(res => {
    // refresh entries so UI + remaining sync with server state
    loadEntries();
  }).catch(err => console.warn('hold toggle failed', err));
}

// refresh table every 2s, update timers every 1s
setInterval(loadEntries, 2000);
setInterval(updateCountdowns, 1000);
// --- i18n for staff page ---
let i18n = null; let currentLang = 'da';
async function loadTranslations() {
  try { const res = await fetch('/static/translations.json'); if (res.ok) i18n = await res.json(); } catch {}
}
function applyI18n() {
  if (!i18n) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const txt = i18n[currentLang]?.[key];
    if (txt) el.textContent = txt;
  });
  document.documentElement.lang = currentLang;
}
function updateLanguage(lang){
  currentLang = lang;
  document.querySelectorAll('.flags .flag').forEach(el => {
    const active = el.dataset.lang === lang;
    el.classList.toggle('active', active);
    el.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  applyI18n();
}

(async function init(){
  await loadTranslations();
  applyI18n();
  updateLanguage(currentLang);
  try {
    const res = await fetch('/license_status');
    if (res.ok) {
      const data = await res.json();
      if (!data.active || data.locked) {
        const h = document.querySelector('#licenseBlocker h2');
        const p = document.querySelector('#licenseBlocker p');
        if (data.locked) {
          h.textContent = '🔒 License invalid';
          p.textContent = 'This device is not licensed for this Raspberry Pi. Contact support.';
        }
        document.getElementById('licenseBlocker').style.display = 'flex';
      }
    }
  } catch {}
  loadEntries();
})();
</script>
</body>
</html>
