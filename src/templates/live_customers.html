<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Customer Entries</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h2>👀 Live Customer Queue</h2>
  <table id="table">
    <thead>
      <tr><th>ID</th><th>Provider</th><th>Digits</th><th>Status</th><th>Hold</th></tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
async function loadEntries() {
  const res = await fetch('/customer_entries');
  const data = await res.json();
  const tbody = document.querySelector('#table tbody');
  tbody.innerHTML = '';
  for (const row of data) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.id}</td>
      <td>${row.provider}</td>
      <td>${row.digits}</td>
      <td>${row.status}</td>
      <td><button onclick="hold(${row.id})">Hold</button></td>
    `;
    tbody.appendChild(tr);
  }
}
async function hold(id) {
  await fetch('/hold_entry', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id})
  });
}
setInterval(loadEntries, 2000);
loadEntries();
</script>
</body>
</html>
