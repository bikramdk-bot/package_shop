<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">Kunde Check-in</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #202124;
      --muted: #6b7280;
      --card: #ffffff;
      --shadow: 0 8px 30px rgba(0,0,0,0.08);
      --primary: #0ea5e9; /* sky-500 */
      --danger: #ef4444;  /* red-500 */
      --success: #10b981; /* green-500 */
      --postnord: #1e90ff;
      --dao: #e11d48;
      --gls: #9ca3af;
      --bring: #22c55e;
      --dhl: #f59e0b;
      --ups: #111827;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }
  .flags { display: flex; gap: 8px; position: relative; z-index: 1000; }
    .flag {
      width: 40px; height: 28px; border-radius: 4px; cursor: pointer; box-shadow: var(--shadow);
      display: inline-flex; align-items: center; justify-content: center; user-select: none;
      background: #fff;
    }
    .flag.active { outline: 3px solid var(--primary); outline-offset: 2px; }
    .flag:focus { outline: 3px solid var(--primary); outline-offset: 2px; }
    .flag img { width: 28px; height: 20px; display: block; }
    .title { font-weight: 700; letter-spacing: 0.5px; display:none; }

    /* Main content */
    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 10px 16px 24px;
    }
    .card {
      width: 100%;
      max-width: 1400px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* Providers */
    .providers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 10px; margin-bottom: 12px; align-items: stretch; }
    .provider {
      height: 22vh; border-radius: 18px; background: #f3f4f6; position: relative; overflow: hidden; cursor: pointer;
      display: grid; place-items: center; transition: transform .15s ease, box-shadow .15s ease, outline .15s ease;
      outline: 2px solid transparent;
      color: #fff; /* ensure text contrast on solid brand fills */
    }

    /* Home button above providers (left-aligned, above PostNord tile) */
    .home-row { display: flex; justify-content: flex-start; align-items: center; margin: 6px 0 6px; }
    .home-btn { border: 0; border-radius: 10px; padding: 10px 12px; font-size: 16px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background: #f3f4f6; color: #111827; box-shadow: var(--shadow); }
    .home-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .home-icon { width: 18px; height: 18px; display: inline-block; }
    .home-icon svg { width: 18px; height: 18px; display: block; fill: none; stroke: #111827; stroke-width: 2; }
    .provider:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .provider.selected { outline: 3px solid var(--primary); }
    .provider.dim { filter: saturate(0.2) brightness(0.85); opacity: 0.6; }
    .provider img { max-height: 60%; max-width: 70%; object-fit: contain; }
    .provider .fallback { font-weight: 900; color: #fff; font-size: 24px; letter-spacing: 0.2px; padding: 0; }
    .p-postnord { background: var(--postnord); }
    .p-dao { background: var(--dao); }
    .p-gls { background: var(--gls); }
    .p-bring { background: var(--bring); }
    .p-ups { background: var(--ups); }
    .p-dhl { background: var(--dhl); }

    /* Digit boxes */
    .input-area { display: grid; gap: 10px; padding: 6px 0 0; align-self: center; width: 100%; max-width: 1000px; }
    .input-row { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; align-items: start; }
    .prompt { font-size: 20px; text-align: left; color: #374151; display: block; }
    .boxes { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
    .box {
      width: clamp(52px, 8vw, 72px); height: clamp(68px, 10vw, 88px); border-radius: 14px; background: #f8fafc; box-shadow: inset 0 0 0 2px #e5e7eb;
      display: grid; place-items: center; font-size: clamp(28px, 6vw, 40px); font-weight: 700; color: #111827; transition: box-shadow .18s ease, transform .18s ease;
    }
    .box.active { box-shadow: inset 0 0 0 3px var(--primary); transform: translateY(-1px); }
    .helper { text-align: center; color: var(--muted); min-height: 22px; }

    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 4px; }
    .btn { border: 0; border-radius: 12px; padding: 14px 18px; font-size: 18px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-ghost { background: #eef2ff; color: #1f2937; }
    .btn-icon { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; font-size: 16px; }
    .icon { width: 18px; height: 18px; display: inline-block; }
    .btn-success {
      background: rgba(16,185,129,1);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 18px rgba(16,185,129,0.35);
    }
    .btn-success .checkmark {
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff; color: rgba(16,185,129,1);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 900;
    }
    .btn-success.breathing { animation: breathing 1.2s ease-in-out infinite; }
    @keyframes breathing { 0%{ transform: translateY(0)} 50%{ transform: translateY(-1px)} 100%{ transform: translateY(0)} }

    .msg { text-align: center; min-height: 24px; font-size: 16px; margin-top: 2px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }

    /* Overlay for DAO kode and success */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .modal { width: min(560px, 96vw); background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 22px; margin-top: 4vh; }
    .modal h3 { margin-top: 0; }
    .modal .boxes { margin: 10px 0 4px; }

    /* Invisible input to reliably trigger Android soft keyboard */
    .soft-kb-input {
      position: fixed; /* keep it on-screen so mobile allows keyboard */
      bottom: 8px; right: 8px; /* fix near bottom-right to avoid overlays */
      width: 1px; height: 1px;
      opacity: 0; border: 0; padding: 0; margin: 0;
      background: transparent; color: transparent;
      z-index: 1; /* below our UI but still focusable */
      pointer-events: none;
    }

    /* small confirmation blink for auto-submit */
    @keyframes blink {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }
    .blink { animation: blink 300ms ease-in-out; }

  /* License expired overlay */
  #licenseBlocker { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 900; text-align: center; padding: 20px; }
  #licenseBlocker h2 { margin: 0; font-size: 1.4rem; }
  #licenseBlocker p { margin: 0; color: #374151; }
  #licenseBlocker a.btn { display: inline-block; margin-top: 6px; padding: 10px 14px; background: #f59e0b; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  #licenseBlocker a.btn:hover { background: #d97706; }

    @media (max-width: 680px) {
      .providers { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="licenseBlocker" aria-live="polite" aria-atomic="true">
      <h2 data-i18n="licenseExpiredTitle">🔒 Licensen er udløbet</h2>
      <p data-i18n="licenseExpiredMsg">Aktivér din licens for at fortsætte med at bruge dashboardet.</p>
      <a class="btn" href="/staff" data-i18n="activateLicense">Aktivér licens</a>
    </div>
    <div class="topbar">
      <div class="flags">
        <div class="flag active" data-lang="da" title="Dansk" role="button" aria-pressed="true" tabindex="0" onclick="updateLanguage('da')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('da'); event.preventDefault();}">
          <img src="/static/flags/da.svg" alt="Dansk" />
        </div>
        <div class="flag" data-lang="en" title="English" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('en')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('en'); event.preventDefault();}">
          <img src="/static/flags/en.svg" alt="English" />
        </div>
        <div class="flag" data-lang="de" title="Deutsch" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('de')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('de'); event.preventDefault();}">
          <img src="/static/flags/de.svg" alt="Deutsch" />
        </div>
        <div class="flag" data-lang="sv" title="Svenska" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('sv')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('sv'); event.preventDefault();}">
          <img src="/static/flags/sv.svg" alt="Svenska" />
        </div>
      </div>
      <div class="title" data-i18n="headline">Indtast dine afhentningsoplysninger</div>
      <div style="width:120px"></div>
    </div>

    <div class="main">
      <div class="card">
        <div class="input-area">
          <div class="input-row">
            <div id="prompt" class="prompt" data-i18n="prompt"></div>
            <div>
              <div id="boxes" class="boxes" aria-live="polite" style="margin-bottom: 6px;" onclick="focusSoftKeyboard()"></div>
              <div id="message" class="msg"></div>
              <div class="actions">
                <button id="scanQrBtn" class="btn btn-ghost btn-icon" style="display:none" onclick="openQrScanner()">
                  <span class="icon" aria-hidden="true">📷</span>
                  <span data-i18n="scanQr">Scan QR</span>
                </button>
                <button id="clearBtn" class="btn btn-ghost" style="display:none" onclick="clearInput()" data-i18n="clear">Ryd</button>
                <button id="submitBtn" class="btn btn-primary" style="display:none" onclick="handleSubmit()" data-i18n="continue">Fortsæt</button>
              </div>
            </div>
          </div>
          <!-- Soft keyboard input used to request a numeric keypad on mobile browsers -->
          <input
            id="softKeyboardInput"
            class="soft-kb-input"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            enterkeyhint="done"
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            aria-hidden="true"
          />
          <div id="helper" class="helper" style="display:none"></div>
        </div>

        <div class="home-row">
          <button class="home-btn" onclick="goHome()" aria-label="Home">
            <span class="home-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path d="M3 10.5L12 3l9 7.5"/>
                <path d="M5 10v10h14V10"/>
                <path d="M10 20v-6h4v6"/>
              </svg>
            </span>
            <span data-i18n="home">Home</span>
          </button>
        </div>
        <div class="providers" id="providers"></div>
      </div>
    </div>
  </div>

  <!-- QR Scan modal -->
  <div id="qrOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="qrTitle">
    <div class="modal">
      <h3 id="qrTitle" data-i18n="scanQrTitle">Scan QR-kode</h3>
      <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
        <video id="qrVideo" playsinline style="width:min(520px,90vw); border-radius:12px; background:#111; aspect-ratio: 4/3;"></video>
        <div id="qrHelp" class="helper" data-i18n="scanQrHelp">Hold QR-koden i rammen</div>
        <div id="qrError" class="msg error" style="display:none;"></div>
        <div class="actions">
          <button id="switchQrBtn" class="btn btn-ghost" onclick="switchQrCamera()">Switch Camera</button>
          <button class="btn btn-ghost" onclick="closeQrScanner()" data-i18n="back">Tilbage</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Provider code modal -->
  <div id="kodeOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 id="kodeTitle" data-i18n="daoTitle">DAO: Indtast 5-cifret afhentningskode</h3>
      <div id="kodeBoxes" class="boxes"></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="closeKode()" data-i18n="back">Tilbage</button>
  <button id="kodeSubmitBtn" class="btn btn-primary" onclick="submitCustomerEntryWithKode()" data-i18n="submit">Indsend</button>
      </div>
      <div id="kodeMsg" class="msg"></div>
    </div>
  </div>

  <!-- Success / Next step modal -->
  <div id="doneOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <!-- Step A: Ask if more packets -->
      <h3 id="moreHdr" data-i18n="haveMorePackets">Har du flere pakker?</h3>
      <div id="finalInfo" style="display:none;">
        <p><span data-i18n="collectionId">Indsamlings-ID</span>: <strong id="colId">#C-00000</strong></p>
        <p><span data-i18n="totalParcels">Samlet antal pakker</span>: <strong id="colCount">0</strong></p>
      </div>
      <div id="ticketInfo" class="msg success" style="display:none; font-size:20px; margin: 10px 0 6px;"></div>
      <div class="actions">
        <button id="noBtn" class="btn btn-ghost" onclick="assignCustomerNumber()" data-i18n="no">NEJ</button>
        <button id="yesBtn" class="btn btn-primary" onclick="nextParcel()" data-i18n="yes">JA</button>
      </div>
    </div>
  </div>

  <script>
    // --- Translations ---
    let i18n = null; let currentLang = 'da';
    async function loadTranslations() {
      try {
        const res = await fetch('/static/translations.json');
        if (res.ok) i18n = await res.json();
      } catch {}
    }
    function applyI18n() {
      if (!i18n) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const txt = i18n[currentLang]?.[key];
        if (txt) el.textContent = txt;
      });
      document.documentElement.lang = currentLang;
    }
    function updateLanguage(lang) {
      currentLang = lang;
      // toggle active state for flags
      document.querySelectorAll('.flags .flag').forEach(el => {
        const active = el.dataset.lang === lang;
        el.classList.toggle('active', active);
        el.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      applyI18n();
      if (selectedProvider && targetLen) {
        renderInputBoxes(targetLen, getSelectedProviderConfig()?.background_color);
      }
      if (document.getElementById('kodeOverlay').classList.contains('show')) {
        updateKodeModalTitle();
      }
    }

    // --- Provider tiles ---
    let providersCfg = [];
    let selectedProvider = null;
    let inputDigits = '';
    let targetLen = 0; // dynamic length based on provider/result
    let lastLookupCount = 0; // optional hint only
    let sessionId = null; // generated only when customer finishes (No, finish)
    let entryIds = []; // accumulate entry IDs for this session
    let kodeTargetLen = 5;
    // QR-driven auto-escalation
    let qrRawCode = null; // full scanned QR string (raw)
    let isQrAuto = false; // when true, handleSubmit will auto-advance using qrSessionDigits
    function getSelectedProviderConfig() {
      return providersCfg.find(p => p.key === selectedProvider) || null;
    }
    function providerAsksLast4() {
      return getSelectedProviderConfig()?.ask_last4 !== false;
    }
    function providerNeedsExtraCode() {
      return !!getSelectedProviderConfig()?.requires_extra_code;
    }
    function getProviderCodeLength() {
      const len = Number(getSelectedProviderConfig()?.extra_code_length || 0);
      return len > 0 ? len : 5;
    }
    function localizedCodePrompt(count) {
      if (currentLang === 'da') return `Indtast ${count}-cifret kode`;
      if (currentLang === 'de') return `Geben Sie den ${count}-stelligen Code ein`;
      if (currentLang === 'sv') return `Ange den ${count}-siffriga koden`;
      return `Enter the ${count}-digit code`;
    }
    function localizedNeedCodeMessage(count) {
      if (currentLang === 'da') return `Angiv ${count} cifre`;
      if (currentLang === 'de') return `${count} Ziffern eingeben`;
      if (currentLang === 'sv') return `Ange ${count} siffror`;
      return `Enter ${count} digits`;
    }
    function updateKodeModalTitle() {
      const title = document.getElementById('kodeTitle');
      if (!title) return;
      const provider = getSelectedProviderConfig();
      const label = provider?.key || 'Code';
      title.textContent = `${label}: ${localizedCodePrompt(kodeTargetLen)}`;
    }
    async function loadProviderSettings() {
      const fallback = [
        { key: 'PostNord', enabled: true, background_color: '#1e90ff', ask_last4: true, requires_extra_code: false, extra_code_length: 0, logo_path: '/static/logos/postnord.png' },
        { key: 'DAO', enabled: true, background_color: '#e11d48', ask_last4: true, requires_extra_code: true, extra_code_length: 5, logo_path: '/static/logos/dao.png' },
        { key: 'GLS', enabled: true, background_color: '#9ca3af', ask_last4: true, requires_extra_code: true, extra_code_length: 3, logo_path: '/static/logos/gls.png' },
        { key: 'UPS', enabled: true, background_color: '#111827', ask_last4: true, requires_extra_code: false, extra_code_length: 0, logo_path: '/static/logos/ups.png' },
        { key: 'Bring', enabled: true, background_color: '#22c55e', ask_last4: false, requires_extra_code: true, extra_code_length: 5, logo_path: '/static/logos/bring.png' },
        { key: 'DHL', enabled: true, background_color: '#f59e0b', ask_last4: true, requires_extra_code: false, extra_code_length: 0, logo_path: '/static/logos/dhl.png' },
      ];
      try {
        const res = await fetch('/provider_settings');
        const data = await res.json();
        const list = Array.isArray(data?.providers) ? data.providers : [];
        providersCfg = (list.length ? list : fallback)
          .filter(p => p && p.enabled !== false)
          .map(p => ({
            key: p.key,
            fallback: p.key,
            background_color: p.background_color || '#4b5563',
            ask_last4: p.ask_last4 !== false,
            requires_extra_code: !!p.requires_extra_code,
            extra_code_length: Number(p.extra_code_length || 0),
            img: p.logo_path || `/static/logos/${String(p.key || '').toLowerCase()}.png`
          }));
      } catch {
        providersCfg = fallback.map(p => ({ ...p, fallback: p.key, img: p.logo_path }));
      }
    }
    function extractDigitsByRule(code, n) {
      if (!code || !n) return '';
      const s = String(code).trim().toUpperCase();
      // Helpers
      const lastTwo = s.slice(-2);
      const isTwoDigits = /^\d{2}$/.test(lastTwo);
      const isTwoLetters = /^[A-Z]{2}$/.test(lastTwo);
      const lastIsAlpha = /[A-Z]$/.test(s);
      const secondLastIsDigit = /\d$/.test(s.slice(-2, -1));

      // Case 1: last two are digits → take last n digits from end of string
      if (isTwoDigits) {
        const digits = s.replace(/\D+/g, '');
        return digits.slice(-n);
      }
      // Case 2: last two are letters → take the n characters before them, then filter digits
      if (isTwoLetters && s.length >= n + 2) {
        const seg = s.slice(-(n + 2), -2);
        return (seg.match(/\d/g) || []).join('').slice(-n);
      }
      // Case 3: last is letter and second-last is digit → mirror Python offset rule generalized by n
      if (lastIsAlpha && secondLastIsDigit && s.length >= n + 7) {
        const seg = s.slice(-(n + 7), -7);
        return (seg.match(/\d/g) || []).join('').slice(-n);
      }
      // Fallback: take last n digits across the whole string
      const digits = s.replace(/\D+/g, '');
      return digits.slice(-n);
    }

    function renderProviders() {
      const wrap = document.getElementById('providers');
      wrap.innerHTML = '';
      providersCfg.forEach(p => {
        const div = document.createElement('div');
        div.className = 'provider';
        div.style.background = p.background_color || '#4b5563';
        div.setAttribute('role','button');
        div.setAttribute('aria-label', p.key);
        div.onclick = () => selectProvider(p);

        const img = document.createElement('img');
        img.src = p.img;
        img.alt = p.key;
        img.onerror = () => {
          img.remove();
          const fb = document.createElement('div');
          fb.className = 'fallback';
          fb.style.background = p.background_color || '#4b5563';
          fb.textContent = p.fallback;
          div.appendChild(fb);
        };
        div.appendChild(img);
        wrap.appendChild(div);
      });
    }

    function selectProvider(p) {
      selectedProvider = p.key;
      const tiles = document.querySelectorAll('.provider');
      tiles.forEach(el => el.classList.remove('selected'));
      // mark selected
      const idx = providersCfg.findIndex(x => x.key === p.key);
      tiles[idx]?.classList.add('selected');
      // dim non-selected
      tiles.forEach((el, i) => {
        if (i !== idx) el.classList.add('dim'); else el.classList.remove('dim');
      });

      inputDigits = '';
      document.getElementById('message').textContent = '';
      kodeTargetLen = getProviderCodeLength();
      targetLen = providerAsksLast4() ? 4 : kodeTargetLen;
      renderInputBoxes(targetLen, p.background_color);
      const showQr = selectedProvider && providerAsksLast4() && targetLen === 4;
      const qrBtn = document.getElementById('scanQrBtn');
      if (qrBtn) qrBtn.style.display = showQr ? '' : 'none';
      // show action buttons now that a provider is chosen
      const clearBtn = document.getElementById('clearBtn');
      if (clearBtn) clearBtn.style.display = '';
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) submitBtn.style.display = '';
      focusActiveBox();
      // Focus invisible input to trigger Android soft keyboard
      focusSoftKeyboard();
      // Set a clearer prompt for UPS/Bring 5-digit code entry
        // No instructional text needed per new spec
    }

    // --- Digit boxes ---
    let activeKeyHandler = null; // will point to handleKey or handleKodeKey depending on context
    function globalKeydown(e) {
      const activeEl = document.activeElement;
      if (activeEl && activeEl.id === 'softKeyboardInput') {
        // Hidden input is handling this; prevent duplicate forwarding
        return;
      }
      if (typeof activeKeyHandler === 'function') {
        activeKeyHandler(e);
      }
    }
    function renderInputBoxes(count, accent) {
      const boxes = document.getElementById('boxes');
      boxes.innerHTML = '';

    async function startQrScanner() {

            ? /front|user|face|facetime/i

          const preferred = devices.find(d => preferredPattern.test(d.label));

    async function qrDetectLoop() {

        if (codes && codes.length > 0) {

      const initial = extractDigitsByRule(raw, 4);
      if (!initial || initial.length < 4) {
        const msg = document.getElementById('message');
        msg.className = 'msg error';
        msg.textContent = (i18n?.[currentLang]?.qrNoDigits) || 'Could not read digits from QR.';
        return;
      }
      // seed QR session and kick off existing flow
      qrRawCode = raw;
      isQrAuto = true;
      targetLen = 4; // ensure we start at 4
      inputDigits = initial;
      renderInputBoxes(targetLen);
      await new Promise(r=>setTimeout(r, 50));

      const el = document.getElementById('softKeyboardInput');
      if (!el) return;
      const currentHandler = () => (typeof activeKeyHandler === 'function' ? activeKeyHandler : handleKey);
      el.addEventListener('input', (e) => {
        const v = e.target.value || '';
        e.target.value = '';
        e.stopPropagation();
        for (const ch of v) {
          if (/^[0-9]$/.test(ch)) currentHandler()({ key: ch });
        }
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' || e.key === 'Enter') {
          e.preventDefault();
          e.stopPropagation();
          currentHandler()(e);
        }
      });
    }

    // Blur hidden input to hide soft keyboard on mobile
    function hideSoftKeyboard() {
      const el = document.getElementById('softKeyboardInput');
      try { if (el) el.blur(); } catch {}
    }

    // Init
    (async function init(){
      await loadTranslations();
      await loadProviderSettings();
      renderProviders();
      // ensure flags reflect current language
      updateLanguage(currentLang);
      // set up hidden input bridge for Android soft keyboard
      setupSoftKeyboardBridge();
      // attach single global keydown handler
      window.onkeydown = globalKeydown;
      // Check license status and block UI if expired or locked
      try {
        const res = await fetch('/license_status');
        if (res.ok) {
          const data = await res.json();
          if (!data.active || data.locked) {
            const h = document.querySelector('#licenseBlocker h2');
            const p = document.querySelector('#licenseBlocker p');
            if (data.locked) {
              h.textContent = '🔒 License invalid';
              p.textContent = 'This device is not licensed for this Raspberry Pi. Contact support.';
            }
            document.getElementById('licenseBlocker').style.display = 'flex';
          }
        }
      } catch {}
    })();
  </script>
</body>
</html>
