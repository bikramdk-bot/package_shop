<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">Kunde Check-in</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #202124;
      --muted: #6b7280;
      --card: #ffffff;
      --shadow: 0 8px 30px rgba(0,0,0,0.08);
      --primary: #0ea5e9; /* sky-500 */
      --danger: #ef4444;  /* red-500 */
      --success: #10b981; /* green-500 */
      --postnord: #1e90ff;
      --dao: #e11d48;
      --gls: #9ca3af;
      --bring: #22c55e;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }
  .flags { display: flex; gap: 8px; position: relative; z-index: 1000; }
    .flag {
      width: 40px; height: 28px; border-radius: 4px; cursor: pointer; box-shadow: var(--shadow);
      display: inline-flex; align-items: center; justify-content: center; user-select: none;
      background: #fff;
    }
    .flag.active { outline: 3px solid var(--primary); outline-offset: 2px; }
    .flag:focus { outline: 3px solid var(--primary); outline-offset: 2px; }
    .flag img { width: 28px; height: 20px; display: block; }
    .title { font-weight: 700; letter-spacing: 0.5px; }

    /* Main content */
    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 10px 16px 24px;
    }
    .card {
      width: min(980px, 92vw);
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    /* Providers */
    .providers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .provider {
      height: 74px; border-radius: 14px; background: #f3f4f6; position: relative; overflow: hidden; cursor: pointer;
      display: grid; place-items: center; transition: transform .15s ease, box-shadow .15s ease, outline .15s ease;
      outline: 2px solid transparent;
    }
    .provider:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .provider.selected { outline: 3px solid var(--primary); }
    .provider img { max-height: 60%; max-width: 70%; object-fit: contain; }
    .provider .fallback { font-weight: 700; color: white; font-size: 20px; padding: 8px 14px; border-radius: 10px; }
    .p-postnord { background: rgba(30,144,255,0.1); }
    .p-dao { background: rgba(225,29,72,0.08); }
    .p-gls { background: rgba(156,163,175,0.15); }
    .p-bring { background: rgba(34,197,94,0.12); }

    /* Digit boxes */
    .input-area { display: grid; gap: 14px; padding: 8px 0 0; }
    .prompt { font-size: 22px; text-align: center; }
    .boxes { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
    .box {
      width: clamp(52px, 8vw, 72px); height: clamp(68px, 10vw, 88px); border-radius: 14px; background: #f8fafc; box-shadow: inset 0 0 0 2px #e5e7eb;
      display: grid; place-items: center; font-size: clamp(28px, 6vw, 40px); font-weight: 700; color: #111827; transition: box-shadow .18s ease, transform .18s ease;
    }
    .box.active { box-shadow: inset 0 0 0 3px var(--primary); transform: translateY(-1px); }
    .helper { text-align: center; color: var(--muted); min-height: 22px; }

    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 4px; }
    .btn { border: 0; border-radius: 12px; padding: 14px 18px; font-size: 18px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-ghost { background: #eef2ff; color: #1f2937; }

    .msg { text-align: center; min-height: 24px; font-size: 16px; margin-top: 6px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }

    /* Overlay for DAO kode and success */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .modal { width: min(560px, 96vw); background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 22px; }
    .modal h3 { margin-top: 0; }
    .modal .boxes { margin: 10px 0 4px; }

  /* License expired overlay */
  #licenseBlocker { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 900; text-align: center; padding: 20px; }
  #licenseBlocker h2 { margin: 0; font-size: 1.4rem; }
  #licenseBlocker p { margin: 0; color: #374151; }
  #licenseBlocker a.btn { display: inline-block; margin-top: 6px; padding: 10px 14px; background: #f59e0b; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  #licenseBlocker a.btn:hover { background: #d97706; }

    @media (max-width: 680px) {
      .providers { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="licenseBlocker" aria-live="polite" aria-atomic="true">
      <h2 data-i18n="licenseExpiredTitle">🔒 License expired</h2>
      <p data-i18n="licenseExpiredMsg">Please activate your license to continue using the dashboard.</p>
      <a class="btn" href="/staff" data-i18n="activateLicense">Activate License</a>
    </div>
    <div class="topbar">
      <div class="flags">
        <div class="flag active" data-lang="da" title="Dansk" role="button" aria-pressed="true" tabindex="0" onclick="updateLanguage('da')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('da'); event.preventDefault();}">
          <img src="/static/flags/da.svg" alt="Dansk" />
        </div>
        <div class="flag" data-lang="en" title="English" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('en')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('en'); event.preventDefault();}">
          <img src="/static/flags/en.svg" alt="English" />
        </div>
        <div class="flag" data-lang="de" title="Deutsch" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('de')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('de'); event.preventDefault();}">
          <img src="/static/flags/de.svg" alt="Deutsch" />
        </div>
        <div class="flag" data-lang="sv" title="Svenska" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('sv')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('sv'); event.preventDefault();}">
          <img src="/static/flags/sv.svg" alt="Svenska" />
        </div>
      </div>
      <div class="title" data-i18n="headline">Indtast dine afhentningsoplysninger</div>
      <div style="width:120px"></div>
    </div>

    <div class="main">
      <div class="card">
        <div class="providers" id="providers"></div>

        <div class="input-area">
          <div id="prompt" class="prompt" data-i18n="prompt">Vælg udbyder og indtast cifre</div>
          <div id="boxes" class="boxes" aria-live="polite"></div>
          <div id="helper" class="helper"></div>
          <div class="actions">
            <button class="btn btn-ghost" onclick="clearInput()" data-i18n="clear">Ryd</button>
            <button id="submitBtn" class="btn btn-primary" onclick="handleSubmit()" data-i18n="continue">Fortsæt</button>
          </div>
          <div id="message" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DAO kode modal -->
  <div id="kodeOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 data-i18n="daoTitle">DAO: Indtast 5-cifret afhentningskode</h3>
      <div id="kodeBoxes" class="boxes"></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="closeKode()" data-i18n="back">Tilbage</button>
        <button class="btn btn-primary" onclick="submitCustomerEntryWithKode()" data-i18n="submit">Indsend</button>
      </div>
      <div id="kodeMsg" class="msg"></div>
    </div>
  </div>

  <!-- Success modal -->
  <div id="doneOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 data-i18n="successTitle">Tak! Din indtastning er modtaget.</h3>
      <div id="finalInfo" style="display:none;">
        <p><span data-i18n="collectionId">Indsamlings-ID</span>: <strong id="colId">#C-00000</strong></p>
        <p><span data-i18n="totalParcels">Samlet antal pakker</span>: <strong id="colCount">0</strong></p>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="finalizeCollection()" data-i18n="noMore">Nej, færdig</button>
        <button class="btn btn-primary" onclick="nextParcel()" data-i18n="yesMore">Ja, har flere</button>
      </div>
    </div>
  </div>

  <script>
    // --- Translations ---
    let i18n = null; let currentLang = 'da';
    async function loadTranslations() {
      try {
        const res = await fetch('/static/translations.json');
        if (res.ok) i18n = await res.json();
      } catch {}
    }
    function applyI18n() {
      if (!i18n) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const txt = i18n[currentLang]?.[key];
        if (txt) el.textContent = txt;
      });
      document.documentElement.lang = currentLang;
    }
    function updateLanguage(lang) {
      currentLang = lang;
      // toggle active state for flags
      document.querySelectorAll('.flags .flag').forEach(el => {
        const active = el.dataset.lang === lang;
        el.classList.toggle('active', active);
        el.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      applyI18n();
    }

    // --- Provider tiles ---
    const providersCfg = [
      { key:'PostNord', color:'var(--postnord)', css:'p-postnord', img:'/static/logos/postnord.png', fallback:'PostNord' },
      { key:'DAO',      color:'var(--dao)',      css:'p-dao',      img:'/static/logos/dao.png',      fallback:'DAO' },
      { key:'GLS',      color:'var(--gls)',      css:'p-gls',      img:'/static/logos/gls.png',      fallback:'GLS' },
      { key:'Bring',    color:'var(--bring)',    css:'p-bring',    img:'/static/logos/bring.png',    fallback:'Bring' },
      { key:'UPS',      color:'#111827',         css:'p-ups',      img:'/static/logos/ups.png',      fallback:'UPS' },
    ];
    const providerVisible = { PostNord:true, DAO:true, GLS:true, Bring:true, UPS:true };// configurable per shop

    let selectedProvider = null;
    let inputDigits = '';
    let targetLen = 0; // dynamic length based on provider/result
    let lastLookupCount = 0; // optional hint only
    let sessionId = null; // generated only when customer finishes (No, finish)
    let entryIds = []; // accumulate entry IDs for this session

    function renderProviders() {
      const wrap = document.getElementById('providers');
      wrap.innerHTML = '';
      providersCfg.filter(p => providerVisible[p.key]).forEach(p => {
        const div = document.createElement('div');
        div.className = `provider ${p.css}`;
        div.setAttribute('role','button');
        div.setAttribute('aria-label', p.key);
        div.onclick = () => selectProvider(p);

        const img = document.createElement('img');
        img.src = p.img;
        img.alt = p.key;
        img.onerror = () => {
          img.remove();
          const fb = document.createElement('div');
          fb.className = 'fallback';
          fb.style.background = p.color;
          fb.textContent = p.fallback;
          div.appendChild(fb);
        };
        div.appendChild(img);
        wrap.appendChild(div);
      });
    }

    function selectProvider(p) {
      selectedProvider = p.key;
      document.querySelectorAll('.provider').forEach(el => el.classList.remove('selected'));
      // mark selected
      const idx = providersCfg.findIndex(x => x.key === p.key);
      document.querySelectorAll('.provider')[idx]?.classList.add('selected');

      inputDigits = '';
      document.getElementById('message').textContent = '';
  if (selectedProvider === 'DAO') targetLen = 4; // start with last 4 to find packet; kode asked later
  else if (selectedProvider === 'Bring') targetLen = 5; // Bring asks 5-digit afhentningskode directly
  else if (selectedProvider === 'UPS') targetLen = 5; // UPS asks 5-digit collection code directly
  else targetLen = 4; // PostNord/GLS start with 4
      renderInputBoxes(targetLen, p.color);
      focusActiveBox();
      // Set a clearer prompt for UPS/Bring 5-digit code entry
      if (selectedProvider === 'UPS' || selectedProvider === 'Bring') {
        document.getElementById('prompt').textContent = 'Indtast 5-cifret afhentningskode';
      } else {
        document.getElementById('prompt').textContent = (i18n?.[currentLang]?.promptDigits) || 'Indtast cifre';
      }
    }

    // --- Digit boxes ---
    function renderInputBoxes(count, accent) {
      const boxes = document.getElementById('boxes');
      boxes.innerHTML = '';
      for (let i=0;i<count;i++) {
        const b = document.createElement('div');
        b.className = 'box' + (i === inputDigits.length ? ' active' : '');
        b.style.setProperty('--accent', accent || 'var(--primary)');
        b.textContent = inputDigits[i] || '';
        boxes.appendChild(b);
      }
      document.getElementById('helper').textContent = `${inputDigits.length}/${count}`;
      // attach key handler
      window.onkeydown = handleKey;
    }

    function handleKey(e) {
      if (e.key === 'Backspace') { inputDigits = inputDigits.slice(0, -1); renderInputBoxes(targetLen); focusActiveBox(); return; }
      if (e.key === 'Enter') { handleSubmit(); return; }
      if (/^[0-9]$/.test(e.key)) {
        if (inputDigits.length < targetLen) {
          inputDigits += e.key;
          renderInputBoxes(targetLen);
          focusActiveBox();
        }
      }
    }
    function focusActiveBox() {
      // purely visual; boxes are not focusable inputs
      const act = document.querySelector('.box.active');
      if (act) act.scrollIntoView({block:'nearest', inline:'nearest'});
    }
    function clearInput() { inputDigits=''; renderInputBoxes(targetLen); document.getElementById('message').textContent=''; }

    // --- Flow handlers ---
    async function handleSubmit() {
      const msg = document.getElementById('message');
      msg.className = 'msg';
      if (!selectedProvider) { msg.textContent = (i18n?.[currentLang]?.chooseProvider)||'Vælg udbyder først'; return; }
      if (inputDigits.length < targetLen) { msg.textContent = (i18n?.[currentLang]?.completeDigits)||'Udfyld alle felter'; return; }

      // UPS and Bring go straight to live with 5-digit kode
      if (selectedProvider === 'UPS' || selectedProvider === 'Bring') {
        if (inputDigits.length !== 5) { const m=document.getElementById('message'); m.className='msg error'; m.textContent=(i18n?.[currentLang]?.need5Digits)||'Angiv 5 cifre'; return; }
        await submitCustomerEntry(inputDigits);
        return;
      }

      // For PostNord/GLS/DAO: use /lookup to match by digits and escalate length when needed
      const res = await fetch('/lookup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: selectedProvider, digits: inputDigits })
      });
      const data = await res.json();
      const results = data?.results || [];
      lastLookupCount = results.length || 0;

      if (selectedProvider === 'PostNord' || selectedProvider === 'GLS' || selectedProvider === 'DAO') {
        if (results.length > 1) {
          if (targetLen === 4) { targetLen = 6; inputDigits = ''; renderInputBoxes(targetLen); msg.textContent = (i18n?.[currentLang]?.needMoreDigits)||'Indtast flere cifre (6)'; return; }
          if (targetLen === 6) { targetLen = 8; inputDigits = ''; renderInputBoxes(targetLen); msg.textContent = (i18n?.[currentLang]?.needMoreDigits8)||'Indtast flere cifre (8)'; return; }
        }
        if (results.length === 0) {
          msg.classList.add('error');
          msg.textContent = (i18n?.[currentLang]?.noMatch)||'Ingen match fundet. Prøv igen.';
          return;
        }
        // DAO requires kode after we have a match
        if (selectedProvider === 'DAO') { openKodeModal(); return; }
        // Otherwise submit entry immediately
        await submitCustomerEntry();
        return;
      }
    }

    async function submitCustomerEntry(kode) {
      const payload = { provider: selectedProvider };
      // For UPS/Bring, send kode and omit digits; otherwise send digits and kode if present
      if (selectedProvider === 'UPS' || selectedProvider === 'Bring') {
        payload.kode = kode;
      } else {
        payload.digits = inputDigits;
        if (kode) payload.kode = kode;
      }
      if (kode) payload.kode = kode;
      const res = await fetch('/customer_entry', {
        method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.matched === false) {
        const msg = document.getElementById('message');
        msg.className = 'msg error';
        msg.textContent = (i18n?.[currentLang]?.noMatch)||'Ingen match fundet. Prøv igen.';
        return;
      }

      if (data.require_kode) {
        openKodeModal();
        return;
      }

  // success -> store entry id and prompt if more (support both 'id' and legacy 'entry_id')
  const newId = (typeof data.id !== 'undefined') ? data.id : data.entry_id;
  if (newId && !entryIds.includes(newId)) entryIds.push(newId);
  const finalInfo = document.getElementById('finalInfo');
  if (finalInfo) finalInfo.style.display = 'none';
  document.getElementById('doneOverlay').classList.add('show');
  // Reset modal buttons for a fresh session prompt
  const yesBtn0 = document.querySelector('#doneOverlay .btn.btn-primary');
  if (yesBtn0) yesBtn0.style.display = '';
  const noBtn0 = document.querySelector('#doneOverlay .btn.btn-ghost');
  if (noBtn0) {
    noBtn0.onclick = finalizeCollection;
    noBtn0.textContent = (i18n?.[currentLang]?.noMore) || 'Nej, færdig';
  }
    }

    // --- DAO kode modal ---
    let kodeDigits = '';
    function openKodeModal() {
      kodeDigits='';
      renderKodeBoxes(5);
      document.getElementById('kodeOverlay').classList.add('show');
      window.onkeydown = handleKodeKey; // redirect key events to kode modal
      document.getElementById('kodeMsg').textContent = '';
    }
    function closeKode() {
      document.getElementById('kodeOverlay').classList.remove('show');
      window.onkeydown = handleKey;
    }
    function renderKodeBoxes(count) {
      const wrap = document.getElementById('kodeBoxes');
      wrap.innerHTML = '';
      for (let i=0;i<count;i++) {
        const b = document.createElement('div');
        b.className = 'box' + (i === kodeDigits.length ? ' active' : '');
        b.textContent = kodeDigits[i] || '';
        wrap.appendChild(b);
      }
    }
    function handleKodeKey(e) {
      const msg = document.getElementById('kodeMsg');
      msg.className = 'msg';
      if (e.key === 'Backspace') { kodeDigits = kodeDigits.slice(0,-1); renderKodeBoxes(5); return; }
      if (e.key === 'Enter') { submitCustomerEntryWithKode(); return; }
      if (/^[0-9]$/.test(e.key)) {
        if (kodeDigits.length < 5) { kodeDigits += e.key; renderKodeBoxes(5); }
      }
    }
    async function submitCustomerEntryWithKode() {
      const msg = document.getElementById('kodeMsg');
      if (kodeDigits.length !== 5) { msg.className='msg error'; msg.textContent = (i18n?.[currentLang]?.need5Digits)||'Angiv 5 cifre'; return; }
      closeKode();
      await submitCustomerEntry(kodeDigits);
    }

    // --- Success modal actions ---
    function nextParcel() {
      document.getElementById('doneOverlay').classList.remove('show');
      inputDigits=''; lastLookupCount=0; // keep provider
      renderInputBoxes(targetLen);
      document.getElementById('message').textContent = '';
      setTimeout(()=>focusActiveBox(), 50);
    }
    async function finalizeCollection() {
      // Assign an ID only when customer is done
      if (entryIds.length === 0) { finishSession(); return; }
      // De-duplicate in case the same entry was added twice
      const uniqueIds = Array.from(new Set(entryIds));
      if (!sessionId) sessionId = `#C-${String(Math.floor(Math.random()*100000)).padStart(5,'0')}`;

      // Immediately show the code while assignment runs in the background
      document.getElementById('colId').textContent = sessionId;
      document.getElementById('colCount').textContent = String(uniqueIds.length);
      const finalInfoEarly = document.getElementById('finalInfo');
      if (finalInfoEarly) finalInfoEarly.style.display = 'block';
      const yesBtnEarly = document.querySelector('#doneOverlay .btn.btn-primary');
      if (yesBtnEarly) yesBtnEarly.style.display = 'none';
      const noBtnEarly = document.querySelector('#doneOverlay .btn.btn-ghost');
      if (noBtnEarly) { noBtnEarly.onclick = finishSession; noBtnEarly.textContent = (i18n?.[currentLang]?.ok) || 'OK'; }
      // Attempt assignment with a simple retry
      let res = await fetch('/assign_collection', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entry_ids: uniqueIds, collection_id: sessionId })
      });
      if (!res.ok) {
        await new Promise(r=>setTimeout(r,300));
        res = await fetch('/assign_collection', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entry_ids: uniqueIds, collection_id: sessionId })
        });
      }

      if (res.ok) {
        let payload = null;
        try { payload = await res.json(); } catch {}
        if (payload && typeof payload.updated === 'number' && payload.updated === 0) {
          // Nothing was updated (could have expired). Show a gentle notice but still allow OK.
          const msg = document.getElementById('message');
          if (msg) { msg.className='msg error'; msg.textContent=(i18n?.[currentLang]?.noMatch)||'Ingen match fundet. Prøv igen.'; }
        }
        document.getElementById('colId').textContent = sessionId;
        document.getElementById('colCount').textContent = String(uniqueIds.length);
        const finalInfo = document.getElementById('finalInfo');
        if (finalInfo) finalInfo.style.display = 'block';
        const yesBtn = document.querySelector('#doneOverlay .btn.btn-primary');
        if (yesBtn) yesBtn.style.display = 'none';
        const noBtn = document.querySelector('#doneOverlay .btn.btn-ghost');
        if (noBtn) {
          noBtn.onclick = finishSession;
          noBtn.textContent = (i18n?.[currentLang]?.ok) || 'OK';
        }
      } else {
        // As a fallback, still show the generated code so staff can assist
        document.getElementById('colId').textContent = sessionId;
        document.getElementById('colCount').textContent = String(uniqueIds.length);
        const finalInfo = document.getElementById('finalInfo');
        if (finalInfo) finalInfo.style.display = 'block';
        const msg = document.getElementById('message');
        if (msg) { msg.className='msg error'; msg.textContent='Kunne ikke tildele lige nu. Prøv igen eller vis koden til personalet.'; }
        const yesBtn = document.querySelector('#doneOverlay .btn.btn-primary');
        if (yesBtn) yesBtn.style.display = 'none';
        const noBtn = document.querySelector('#doneOverlay .btn.btn-ghost');
        if (noBtn) { noBtn.onclick = finishSession; noBtn.textContent = (i18n?.[currentLang]?.ok) || 'OK'; }
      }
    }
    function finishSession() {
      document.getElementById('doneOverlay').classList.remove('show');
      // reset everything
      selectedProvider = null; inputDigits=''; lastLookupCount=0; targetLen=0; sessionId=null; entryIds=[];
      document.getElementById('providers').querySelectorAll('.provider').forEach(el=>el.classList.remove('selected'));
      document.getElementById('boxes').innerHTML='';
      document.getElementById('helper').textContent='';
      document.getElementById('prompt').textContent = (i18n?.[currentLang]?.prompt) || 'Vælg udbyder og indtast cifre';
      const yesBtn = document.querySelector('#doneOverlay .btn.btn-primary');
      if (yesBtn) yesBtn.style.display = '';
      const noBtn = document.querySelector('#doneOverlay .btn.btn-ghost');
      if (noBtn) { noBtn.onclick = finalizeCollection; noBtn.textContent = (i18n?.[currentLang]?.noMore) || 'Nej, færdig'; }
    }

    // Init
    (async function init(){
      await loadTranslations();
      renderProviders();
      // ensure flags reflect current language
      updateLanguage(currentLang);
      // Check license status and block UI if expired
      try {
        const res = await fetch('/license_status');
        if (res.ok) {
          const data = await res.json();
          if (!data.active) {
            document.getElementById('licenseBlocker').style.display = 'flex';
          }
        }
      } catch {}
    })();
  </script>
</body>
</html>
