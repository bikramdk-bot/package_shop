<!-- templates/collected_log.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="logTitle">Collected Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 60px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  .flags { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 8px; z-index: 1000; }
    .flag { width: 40px; height: 28px; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.12); display: inline-flex; align-items: center; justify-content: center; background: #fff; }
    .flag.active { outline: 3px solid #0ea5e9; outline-offset: 2px; }
    .flag img { width: 28px; height: 20px; display: block; }
  </style>
</head>
<body>
  <div class="flags">
    <div class="flag active" data-lang="da" title="Dansk" role="button" aria-pressed="true" tabindex="0" onclick="updateLanguage('da')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('da'); event.preventDefault();}">
      <img src="/static/flags/da.svg" alt="Dansk" />
    </div>
    <div class="flag" data-lang="en" title="English" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('en')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('en'); event.preventDefault();}">
      <img src="/static/flags/en.svg" alt="English" />
    </div>
    <div class="flag" data-lang="de" title="Deutsch" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('de')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('de'); event.preventDefault();}">
      <img src="/static/flags/de.svg" alt="Deutsch" />
    </div>
    <div class="flag" data-lang="sv" title="Svenska" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('sv')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('sv'); event.preventDefault();}">
      <img src="/static/flags/sv.svg" alt="Svenska" />
    </div>
  </div>
  {% include 'nav_bar.html' %}
  <h2 data-i18n="logHeading">🗒️ Collected / Held / Expired Parcels</h2>

  <table>
    <thead>
      <tr>
        <th data-i18n="colProvider">Provider</th>
        <th data-i18n="colDigits">Digits</th>
        <th data-i18n="colBarcode">Barcode</th>
        <th data-i18n="colType">Type</th>
        <th data-i18n="colTime">Time</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r['provider'] }}</td>
        <td>{{ r['digits'] }}</td>
        <td>{{ r['barcode'] }}</td>
        <td>{{ r['log_type'] }}</td>
        <td>{{ r['collected_at'] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <script>
    // i18n for staff log page
    let i18n = null; let currentLang = 'da';
    async function loadTranslations() {
      try { const res = await fetch('/static/translations.json'); if (res.ok) i18n = await res.json(); } catch {}
    }
    function applyI18n() {
      if (!i18n) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const txt = i18n[currentLang]?.[key];
        if (txt) el.textContent = txt;
      });
      document.documentElement.lang = currentLang;
    }
    function updateLanguage(lang){
      currentLang = lang;
      document.querySelectorAll('.flags .flag').forEach(el => {
        const active = el.dataset.lang === lang;
        el.classList.toggle('active', active);
        el.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      applyI18n();
    }
    (async function init(){
      await loadTranslations();
      applyI18n();
      updateLanguage(currentLang);
    })();
  </script>
</body>
</html>
