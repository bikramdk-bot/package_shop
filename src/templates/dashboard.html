<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="staffDashTitle">Staff Parcel Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
  .flags { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 8px; z-index: 1000; }
    .flag { width: 40px; height: 28px; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.12); display: inline-flex; align-items: center; justify-content: center; background: #fff; }
    .flag.active { outline: 3px solid #0ea5e9; outline-offset: 2px; }
    .flag img { width: 28px; height: 20px; display: block; }
    /* License expired overlay */
    #licenseBlocker { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 900; text-align: center; padding: 20px; }
    #licenseBlocker h2 { margin: 0; font-size: 1.4rem; }
    #licenseBlocker p { margin: 0; color: #374151; }
    #licenseBlocker a.btn { display: inline-block; margin-top: 6px; padding: 10px 14px; background: #f59e0b; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    #licenseBlocker a.btn:hover { background: #d97706; }
  </style>
</head>
<body>
  <div id="licenseBlocker" aria-live="polite" aria-atomic="true">
    <h2 data-i18n="licenseExpiredTitle">🔒 License expired</h2>
    <p data-i18n="licenseExpiredMsg">Please activate your license to continue using the dashboard.</p>
    <a class="btn" href="/staff" data-i18n="activateLicense">Activate License</a>
  </div>
  <div class="flags">
    <div class="flag active" data-lang="da" title="Dansk" role="button" aria-pressed="true" tabindex="0" onclick="updateLanguage('da')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('da'); event.preventDefault();}">
      <img src="/static/flags/da.svg" alt="Dansk" />
    </div>
    <div class="flag" data-lang="en" title="English" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('en')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('en'); event.preventDefault();}">
      <img src="/static/flags/en.svg" alt="English" />
    </div>
    <div class="flag" data-lang="de" title="Deutsch" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('de')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('de'); event.preventDefault();}">
      <img src="/static/flags/de.svg" alt="Deutsch" />
    </div>
    <div class="flag" data-lang="sv" title="Svenska" role="button" aria-pressed="false" tabindex="0" onclick="updateLanguage('sv')" onkeydown="if(event.key==='Enter'||event.key===' '){updateLanguage('sv'); event.preventDefault();}">
      <img src="/static/flags/sv.svg" alt="Svenska" />
    </div>
  </div>

  {% include 'nav_bar.html' %}
  <h2 data-i18n="parcelsInShop">📦 Parcels in Shop</h2>
  <div id="addPacket" style="margin:10px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <strong data-i18n="addPacket">➕ Add Packet</strong>
    <label data-i18n="inputProvider">Provider</label>
    <select id="addProvider">
      <option>PostNord</option>
      <option>DAO</option>
      <option>GLS</option>
      <option>Bring</option>
      <option>UPS</option>
      <option>DHL</option>
    </select>
    <label data-i18n="inputDigits">Digits</label>
    <input id="addDigits" type="text" placeholder="123456" style="width:120px;">
    <label data-i18n="inputBarcode">Barcode</label>
    <input id="addBarcode" type="text" placeholder="optional" style="width:180px;">
    <button onclick="addPacket()" data-i18n="btnAdd">Add</button>
    <span id="addStatus" style="margin-left:8px;color:#555;"></span>
  </div>
  <div id="printControl" style="margin:10px 0; display:flex; gap:8px; align-items:center;">
    <label data-i18n="printMode">Print labels</label>
    <button id="printToggle" onclick="togglePrintMode()" style="padding:6px 10px; border-radius:6px;">Loading...</button>
    <span id="printModeMsg" style="color:#555;"></span>
  </div>
  <div style="margin:10px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <label data-i18n="filterProvider">Provider</label>
    <select id="filterProvider">
      <option value="" selected data-i18n="all">All</option>
      <option>PostNord</option>
      <option>DAO</option>
      <option>GLS</option>
      <option>Bring</option>
      <option>UPS</option>
      <option>DHL</option>
    </select>
    <label data-i18n="filterStatus">Status</label>
    <select id="filterStatus">
      <option value="" selected data-i18n="all">All</option>
      <option value="in_shop">in_shop</option>
      <option value="collected">collected</option>
      <option value="held">held</option>
    </select>
    <label data-i18n="sortBy">Sort</label>
    <select id="sortBy">
      <option value="time_desc" selected data-i18n="sortTimeDesc">Newest</option>
      <option value="time_asc" data-i18n="sortTimeAsc">Oldest</option>
      <option value="provider_asc" data-i18n="sortProviderAsc">Provider A-Z</option>
      <option value="provider_desc" data-i18n="sortProviderDesc">Provider Z-A</option>
    </select>
  </div>

  <table id="parcelTable">
    <thead>
      <tr>
  <th data-i18n="colId">ID</th>
  <th data-i18n="colProvider">Provider</th>
  <th data-i18n="colDigits">Digits</th>
  <th data-i18n="colBarcode">Barcode</th>
  <th data-i18n="colEntryDate">Entry date</th>
  <th data-i18n="colStatus">Status</th>
  <th data-i18n="colActions">Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
  let cache = [];
  // Format a timestamp into `DD-mon` (e.g. 12-apr). Returns empty string for falsy input.
  function formatEntryDate(ts) {
    if (!ts) return '';
    // Accept either a Date object or a parsable date string
    const d = (ts instanceof Date) ? ts : new Date(ts);
    if (isNaN(d)) return String(ts);
    const day = String(d.getDate()).padStart(2, '0');
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const mon = months[d.getMonth()] || '';
    return `${day}-${mon}`;
  }
  async function checkLicense() {
    try {
      const res = await fetch('/license_status');
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      if (!data.active) {
        document.getElementById('licenseBlocker').style.display = 'flex';
      }
    } catch (e) {
      // If status endpoint fails, fail open (no block) to avoid locking staff out unexpectedly
      console.warn('license_status failed', e);
    }
  }
  async function loadParcels() {
    const res = await fetch('/all_parcels');
    cache = await res.json();
    render();
  }

  async function addPacket(){
    const provider = document.getElementById('addProvider').value.trim();
    const digits = document.getElementById('addDigits').value.trim();
    const barcode = document.getElementById('addBarcode').value.trim();
    const status = document.getElementById('addStatus');
    status.textContent = '';
    if(!provider || !digits){
      status.textContent = 'Missing provider/digits';
      status.style.color = 'red';
      return;
    }
    const res = await fetch('/insert', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({provider, digits, barcode})
    });
    const data = await res.json();
    if(res.ok){
      status.textContent = data.message || 'Inserted';
      status.style.color = 'green';
      document.getElementById('addDigits').value = '';
      document.getElementById('addBarcode').value = '';
      loadParcels();
    }else{
      status.textContent = data.warning || data.error || 'Failed';
      status.style.color = 'red';
    }
  }

  function render(){
    const tbody = document.querySelector('#parcelTable tbody');
    tbody.innerHTML = '';
    const fp = document.getElementById('filterProvider').value;
    const fs = document.getElementById('filterStatus').value;
    const sort = document.getElementById('sortBy').value;

    let data = cache.slice();
    if (fp) data = data.filter(r=>r.provider===fp);
    if (fs) data = data.filter(r=>r.status===fs);

    const cmp = {
      time_desc:(a,b)=> new Date(b.scan_time)-new Date(a.scan_time),
      time_asc:(a,b)=> new Date(a.scan_time)-new Date(b.scan_time),
      provider_asc:(a,b)=> (a.provider||'').localeCompare(b.provider||''),
      provider_desc:(a,b)=> (b.provider||'').localeCompare(a.provider||'')
    };
    data.sort(cmp[sort]||cmp.time_desc);

    data.forEach(row => {
      const tr = document.createElement('tr');
      const entryDateStr = formatEntryDate(row.entry_date || row.scan_time || '');
      tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.provider}</td>
        <td>${row.digits}</td>
        <td>${row.barcode || ''}</td>
        <td>${entryDateStr}</td>
        <td>${row.status}</td>
        <td>
          <button data-i18n="btnCollected" onclick="updateStatus('${row.provider}', '${row.digits}', 'collected')">✅ Collected</button>
          <button data-i18n="btnDelete" onclick="deleteParcel(${row.id})">🗑️ Delete</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  async function updateStatus(provider, digits, status) {
    await fetch('/update_status', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({provider, digits, status})
    });
    loadParcels();
  }

  async function deleteParcel(id) {
    if (!id && id !== 0) return;
    await fetch('/delete_parcel', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id})
    });
    loadParcels();
  }

  // --- i18n for staff page ---
  let i18n = null; let currentLang = 'da';
  async function loadTranslations() {
    try { const res = await fetch('/static/translations.json'); if (res.ok) i18n = await res.json(); } catch {}
  }
  function applyI18n() {
    if (!i18n) return;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const txt = i18n[currentLang]?.[key];
      if (txt) el.textContent = txt;
    });
    document.documentElement.lang = currentLang;
  }
  function updateLanguage(lang){
    currentLang = lang;
    document.querySelectorAll('.flags .flag').forEach(el => {
      const active = el.dataset.lang === lang;
      el.classList.toggle('active', active);
      el.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    applyI18n();
  }

  (async function init(){
    await loadTranslations();
    applyI18n();
    updateLanguage(currentLang);
    await checkLicense();
    // Wire filters/sort to re-render client-side without refetching
    document.getElementById('filterProvider').addEventListener('change', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.getElementById('sortBy').addEventListener('change', render);
    // Initialize print mode control
    await refreshPrintMode();
    loadParcels();
  })();

  async function refreshPrintMode(){
    const btn = document.getElementById('printToggle');
    const msg = document.getElementById('printModeMsg');
    try{
      const res = await fetch('/print_mode');
      if(!res.ok) throw new Error('status ' + res.status);
      const j = await res.json();
      const on = !!j.print;
      btn.textContent = on ? (i18n?.[currentLang]?.printOn || 'ON') : (i18n?.[currentLang]?.printOff || 'OFF');
      btn.style.background = on ? '#10b981' : '#ef4444';
      msg.textContent = on ? (i18n?.[currentLang]?.printModeEnabled || 'Printing enabled') : (i18n?.[currentLang]?.printModeDisabled || 'Printing disabled');
    }catch(e){
      btn.textContent = 'Err';
      msg.textContent = '';
      console.warn('refreshPrintMode failed', e);
    }
  }

  async function togglePrintMode(){
    const btn = document.getElementById('printToggle');
    const msg = document.getElementById('printModeMsg');
    try{
      const cur = await fetch('/print_mode');
      const j = await cur.json();
      const next = !j.print;
      const res = await fetch('/print_mode', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({print: next}) });
      if(!res.ok) {
        const err = await res.json().catch(()=>({error:'failed'}));
        msg.textContent = err.error || (i18n?.[currentLang]?.printToggleFail || 'Failed');
        msg.style.color = 'red';
        return;
      }
      await refreshPrintMode();
      msg.textContent = i18n?.[currentLang]?.printToggleSuccess || 'Updated';
      msg.style.color = 'green';
    }catch(e){
      console.warn('togglePrintMode failed', e);
    }
  }
  </script>
</body>
</html>
